<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expense Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="card">
    <h2 class="text-center mb-4">📒 Daily Expenses</h2>

    <form id="expenseForm">
      <div class="mb-3">
        <label class="form-label">Money Spent</label>
        <input type="number" step="0.01" min="0" name="money" class="form-control" placeholder="E.g., 150" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <input type="text" name="description" class="form-control" placeholder="E.g., Uber ride to office" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Category</label>
        <select name="category" class="form-select" required>
          <option value="">--Select Category--</option>
          <option value="food">Food</option>
          <option value="travel">Travel</option>
          <option value="shopping">Shopping</option>
          <option value="rent">Rent</option>
          <option value="entertainment">Entertainment</option>
        </select>
      </div>

      <button type="submit" class="btn btn-custom mt-3">Add Expense</button>
    </form>

    <div id="expenseList" class="mt-4">
      <h3 class="text-center mb-3">🧾 Your Expenses</h3>
      <ul id="expenseItems" class="list-group"></ul>
    </div>
  </div>

  <!-- Axios and Expense Script -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/expense.js"></script>
</body>
</html>
